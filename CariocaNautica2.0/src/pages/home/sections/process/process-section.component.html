<section id="processo" class="section process">
  <div class="container">
    <header class="section-header">
      <h2>{{ data.title }}</h2>
      <p>{{ data.subtitle }}</p>
    </header>

    <ol class="process__timeline">
      @for (step of data.steps; track step.order) {
        <li class="process__step">
          <span class="process__number">{{ step.order }}</span>
          <div class="process__content">
            <h3>{{ step.title }}</h3>
            <p>{{ step.description }}</p>
          </div>
        </li>
      }
    </ol>
  </div>
</section>
