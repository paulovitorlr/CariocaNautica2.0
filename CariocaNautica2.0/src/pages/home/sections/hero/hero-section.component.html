<section id="hero" class="section hero">
  <div class="container hero__grid">
    <div class="hero__content">
      <h1>{{ data.headline }}</h1>
      <p class="hero__subtitle">{{ data.subtitle }}</p>
      <a class="btn btn--large" [href]="ctaHref">{{ data.cta.label }}</a>
    </div>
    <div class="hero__media">
      <div class="placeholder-image" role="img" [attr.aria-label]="data.imageAlt">
        Imagem placeholder
      </div>
    </div>
  </div>
</section>
